name: E2E Tests with Docker

on:
  push:
    branches: ['dev', 'main']
  pull_request:
    branches: ['dev', 'main']

jobs:
  e2e-test:
    runs-on: ubuntu-24.04
    env:
      DATABASE_URL: ${{ vars.DATABASE_URL }}
      DATABASE_URL_TEST: ${{ vars.DATABASE_URL_TEST }}
    services:
      test_db:
        image: postgres:17.6
        env:
          POSTGRES_PASSWORD: ${{ vars.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - '5432:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Set DATABASE_URL dynamically
        run: |
          if [ -z "$DATABASE_URL" ]; then
          echo "DATABASE_URL=postgres://${{ vars.POSTGRES_USER }}:${{ vars.POSTGRES_PASSWORD }}@localhost:5432/${{ vars.POSTGRES_DB }}" >> $GITHUB_ENV
          fi
          echo "DATABASE_URL_TEST=$DATABASE_URL" >> $GITHUB_ENV

      - name: Run generation schema prisma
        run: npx prisma generate

      - name: Run migrations on test
        run: npx prisma migrate deploy

      - name: Run seed
        run: npx prisma db seed

      - name: Run E2E tests
        run: npm run test:e2e
