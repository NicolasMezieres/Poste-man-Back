name: E2E Tests with Docker

on:
  push:
    branches: ['dev', 'main']
  pull_request:
    branches: ['dev', 'main']

jobs:
  e2e-test:
    runs-on: ubuntu-24.04

    services:
      test_db:
        image: postgres:17.6
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_USER: test
          POSTGRES_DB: dbname
        ports:
          - '5432:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:password@localhost:5432/testdb
      DATABASE_URL_TEST: postgresql://test:password@localhost:5432/testdb
      PASSWORD_ADMIN: strongSecretP@ssword73
      JWT_SECRET: MySecretKey

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run generation schema prisma
        run: npx prisma generate

      - name: Run migrations on test
        run: npx prisma migrate deploy

      - name: Run seed
        run: npx prisma db seed

      - name: Run E2E tests
        run: npm run test:e2e
