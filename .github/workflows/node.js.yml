name: Node.js CI

on:
  push:
    branches: ['dev', 'main']
  pull_request:
    branches: ['dev', 'main']

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint test
        run: npm lint

      - name: Prettier format
        run: npm run format

      - name: Unit test
        run: npm test

      - name: Build
        run: npm run build
